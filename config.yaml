server:
  port: 8080
  read_timeout_sec: 15
  write_timeout_sec: 30

database:
  driver: "sqlite3"
  path: "./data/media.db"
  busy_timeout_ms: 5000
  journal_mode: "WAL"
  synchronous: "NORMAL"

scanner:
  media_dir: "./media"            # root — subdirectories (movies/, tvshows/, anime/) become libraries
  max_concurrent_ffprobes: 2
  scan_batch_size: 50
  enable_filesystem_watcher: true

encoder:
  enable_auto_480p_hls: true     # Automatically creates 480p HLS from 1080p
  hls_segment_duration_sec: 4
  ffmpeg_preset: "superfast"
  hls_output_dir: "./data/hls"

integrations:
  tmdb_api_key: "change-me-to-a-real-key"

ui:
  theme: "dark"
  app_title: "My Home Netflix"