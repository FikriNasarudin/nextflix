server:
  port: 8080
  read_timeout_sec: 15
  write_timeout_sec: 0

database:
  driver: "sqlite3"
  path: "./data/media.db"
  busy_timeout_ms: 5000
  journal_mode: "WAL"
  synchronous: "NORMAL"

data:
  dir: "./data"                          # Jellyfin: ProgramDataPath
  metadata_dir: "./data/metadata/library" # Jellyfin: InternalMetadataPath — per-item JSON + images
  image_cache_dir: "./data/images/tmdb"  # Shared TMDB image cache (deduplicated)
  collections_dir: "./data/collections"  # Collection JSON files

scanner:
  media_dir: "./media"            # root — subdirectories (movies/, tvshows/, anime/) become libraries
  max_concurrent_ffprobes: 2
  scan_batch_size: 50
  enable_filesystem_watcher: true

transcoder:
  enabled: true
  segment_duration_sec: 4
  session_idle_timeout_sec: 30
  shm_dir: "/dev/shm/homestream"
  hls_list_size: 30

integrations:
  tmdb_api_key: "change-me-to-a-real-key"

ui:
  theme: "dark"
  app_title: "My Home Netflix"
