services:
  nextflix:
    build: .
    container_name: nextflix
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./media:/media          # subdirectories (movies/, tvshows/, anime/) auto-create libraries
      - ./config.yaml:/config.yaml:ro
    environment:
      - TZ=UTC
      - NEXTFLIX_CONFIG=/config.yaml

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
