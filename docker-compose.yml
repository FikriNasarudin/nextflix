services:
  nextflix:
    build: .
    container_name: nextflix
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data                                  # Database, metadata, images, collections, transcodes
      - ./media:/media                                # Media libraries (subdirectories auto-create libraries)
      - ./config.yaml:/config.yaml:ro                 # Read-only config
    environment:
      - TZ=UTC
      - NEXTFLIX_CONFIG=/config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
