services:
  nextflix:
    build: .
    container_name: nextflix
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./media:/media
      - ./config.yaml:/config.yaml:ro
    environment:
      - TZ=UTC
      - NEXFLIX_CONFIG=/config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
