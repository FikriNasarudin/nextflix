{{define "content"}}
<div id="loginOverlay" class="login-overlay" style="display:none">
  <div class="login-box">
    <h2>Sign In</h2>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Password">
    <p id="loginError" class="login-error"></p>
    <button id="loginBtn">Sign In</button>
    <p class="login-hint">Default: admin / admin</p>
  </div>
</div>

<div id="app" style="display:none">
  <section class="hero" id="hero">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-content">
      <h1 class="hero-title" id="heroTitle"></h1>
      <p class="hero-meta" id="heroMeta"></p>
      <p class="hero-overview" id="heroOverview"></p>
      <div class="hero-buttons">
        <button class="btn-play" id="heroPlay">▶ Play</button>
        <button class="btn-info" id="heroInfo">More Info</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <div id="skeletonHero" class="hero-skeleton"></div>
  <div class="skeleton-row" id="skeletonRow">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <section class="row-section" id="continueRow" style="display:none">
    <h2 class="row-title">Continue Watching</h2>
    <div class="row" id="continueContainer"></div>
  </section>

  <section class="row-section" id="collectionsRow" style="display:none">
    <h2 class="row-title">Collections</h2>
    <div class="row" id="collectionsContainer"></div>
  </section>

  <section class="row-section" id="trendingRow" style="display:none">
    <h2 class="row-title">Daily Top 10</h2>
    <div class="row row-trending" id="trendingContainer"></div>
  </section>

  <div id="pageContent"></div>
</div>

<div id="playerOverlay" class="player-overlay" style="display:none">
  <div class="player-overlay-top">
    <button class="player-overlay-close" id="playerOverlayClose">✕</button>
    <span class="player-overlay-title" id="playerOverlayTitle"></span>
    <select id="overlaySubtitleSelect" class="track-select" style="display:none"><option value="">Subtitles</option></select>
  </div>
  <video id="overlayVideo" controls autoplay></video>
</div>
{{end}}
